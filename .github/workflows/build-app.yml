name: Build App

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish the DMG as a GitHub Release
        required: true
        default: false
        type: boolean
      release_tag:
        description: Release tag to create, for example v1.0.0
        required: false
        type: string
      release_name:
        description: Release title. Defaults to the release tag.
        required: false
        type: string
      release_notes:
        description: Release notes. Defaults to a short packaging note.
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: build-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-app:
    name: Package App Archive
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show Swift version
        run: swift --version

      - name: Install DMG packaging tool
        run: |
          python3 -m venv .venv-dmgbuild
          . .venv-dmgbuild/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dmgbuild
          echo "$PWD/.venv-dmgbuild/bin" >> "$GITHUB_PATH"

      - name: Build app archive
        run: ./script/build_and_run.sh --package

      - name: Verify app archive exists
        run: |
          set -euo pipefail
          shopt -s nullglob
          app_archives=(dist/Oracle\ Free\ App-*.dmg)
          if [ "${#app_archives[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one app archive, found ${#app_archives[@]}."
            exit 1
          fi

      - name: Upload app archive
        uses: actions/upload-artifact@v4
        with:
          name: oracle-free-app-dmg
          path: dist/Oracle Free App-*.dmg
          if-no-files-found: error

      - name: Publish GitHub release
        if: ${{ inputs.publish_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NAME: ${{ inputs.release_name }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          release_assets=(dist/Oracle\ Free\ App-*.dmg)
          if [ "${#release_assets[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one release asset, found ${#release_assets[@]}."
            exit 1
          fi
          RELEASE_ASSET="${release_assets[0]}"

          if [ -z "$RELEASE_TAG" ]; then
            echo "::error::release_tag is required when publish_release is enabled."
            exit 1
          fi

          if [ -z "$RELEASE_NAME" ]; then
            RELEASE_NAME="$RELEASE_TAG"
          fi

          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="Ad hoc signed, non-notarized Oracle Free App build."
          fi

          gh release create "$RELEASE_TAG" "$RELEASE_ASSET" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_NAME" \
            --notes "$RELEASE_NOTES"
